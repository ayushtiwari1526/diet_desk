<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Edit Profile</title>
    
    <!-- Premium Google Fonts & System Framework Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    
    {% include 'diet_desk_app/common/cdn.html' %}

    <style>
        /* ── Core Framework & Canvas Mesh Background ── */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #0f172a;
            margin: 0;
            padding: 0;
            background-color: #f4f9f5;
            background-image: 
                radial-gradient(at 0% 0%, rgba(34, 197, 94, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(56, 189, 248, 0.08) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(134, 239, 172, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 24px;
            box-sizing: border-box;
        }

        .dashboard-grid {
            display: flex;
            gap: 32px;
            align-items: flex-start;
        }

        /* ── Left Profile Panel ── */
        .panel-sidebar {
            flex: 0 0 340px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 28px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.01);
            box-sizing: border-box;
        }

        .avatar-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 20px auto;
        }

        .profile-preview {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffffff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 2;
        }

        .avatar-container::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, #22c55e, #86efac);
            z-index: 1;
        }

        .user-meta-name {
            font-size: 1.4rem;
            font-weight: 800;
            color: #0a1a0f;
            margin: 0 0 6px 0;
            letter-spacing: -0.02em;
        }

        .role-badge {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #16a34a;
            background: #f0fdf4;
            padding: 6px 14px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 32px;
        }

        /* Stats Micro-Widgets */
        .stats-deck {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: rgba(248, 250, 252, 0.6);
            padding: 16px;
            border-radius: 20px;
            border: 1px solid rgba(241, 245, 249, 0.8);
        }

        .stat-item {
            text-align: center;
        }

        .stat-item:first-child {
            border-right: 1px solid #e2e8f0;
        }

        .stat-val {
            display: block;
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
        }

        .stat-lbl {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 600;
        }

        /* ── Right Content Form Deck ── */
        .panel-main-deck {
            flex: 1;
            background: #ffffff;
            border-radius: 28px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.015);
            padding: 40px;
            box-sizing: border-box;
        }

        .deck-header {
            margin-bottom: 32px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 20px;
        }

        .form-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: #0a1a0f;
            margin: 0 0 4px 0;
            letter-spacing: -0.02em;
        }

        .form-subtitle {
            font-size: 0.95rem;
            color: #64748b;
            margin: 0;
        }

        /* Form Layout Matrix */
        .form-matrix {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 24px;
            row-gap: 20px;
        }

        .matrix-fullwidth {
            grid-column: span 2;
        }

        .input-group-custom {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #334155;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-label i {
            font-size: 1rem;
            color: #64748b;
        }

        .custom-input {
            height: 52px;
            border-radius: 14px;
            border: 1px solid #cbd5e1;
            padding: 0 16px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            color: #0f172a;
            background: #ffffff;
            box-sizing: border-box;
            transition: all 0.2s ease;
            width: 100%;
            outline: none;
        }

        .custom-input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
            background: #ffffff;
        }

        .custom-input:read-only {
            background: #f8fafc;
            border-color: #e2e8f0;
            color: #64748b;
            cursor: not-allowed;
        }

        /* Styled File Native Field */
        .file-upload-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .file-upload-wrapper::before {
            content: '\eb1a';
            font-family: 'tabler-icons' !important;
            position: absolute;
            left: 16px;
            color: #64748b;
            font-size: 1.1rem;
        }

        .custom-input[type="file"] {
            padding-left: 44px;
            padding-top: 12px;
            cursor: pointer;
        }

        /* Actions Bar */
        .actions-shelf {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: flex-end;
        }

        .update-btn {
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0 32px;
            height: 52px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.25);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .update-btn:hover {
            background: #16a34a;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.35);
        }

        /* Responsive Breakpoints */
        @media (max-width: 960px) {
            .dashboard-grid {
                flex-direction: column;
                align-items: stretch;
            }
            .panel-sidebar {
                flex: none;
                width: 100%;
            }
        }

        @media (max-width: 640px) {
            .form-matrix {
                grid-template-columns: 1fr;
            }
            .matrix-fullwidth {
                grid-column: span 1;
            }
            .panel-main-deck {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    {% include 'diet_desk_app/user/user_navbar.html' %}

    <div class="dashboard-container">
        <div class="dashboard-grid">
            
            <!-- ── Left Sidebar Profile Card ── -->
            <aside class="panel-sidebar">
                <div class="avatar-container">
                    <!-- Live interactive unique ID for custom instant image feedback -->
                    <img src="{{user.profile_pic.url}}" class="profile-preview" id="avatarDisplaySide">
                </div>
                
                <h2 class="user-meta-name">{{user.name}}</h2>
                <div class="role-badge">
                    <i class="ti ti-shield-check"></i> Verified Member
                </div>

                <div class="stats-deck">
                    <div class="stat-item">
                        <span class="stat-val">Active</span>
                        <span class="stat-lbl">Status</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-val">{{user.city}}</span>
                        <span class="stat-lbl">Location</span>
                    </div>
                </div>
            </aside>

            <!-- ── Right Edit Control Panel ── -->
            <main class="panel-main-deck">
                <div class="deck-header">
                    <h1 class="form-title">Account Settings</h1>
                    <p class="form-subtitle">Update your personal information and adjust profile metadata fields</p>
                </div>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="form-matrix">
                        <!-- Fullname Field -->
                        <div class="input-group-custom">
                            <label class="form-label"><i class="ti ti-user"></i> Full Name</label>
                            <input type="text"
                                   name="name"
                                   value="{{user.name}}"
                                   class="custom-input"
                                   required>
                        </div>

                        <!-- Email Field (Read Only) -->
                        <div class="input-group-custom">
                            <label class="form-label"><i class="ti ti-mail"></i> Email Address</label>
                            <input type="email"
                                   name="email"
                                   value="{{user.email}}"
                                   readonly
                                   class="custom-input">
                        </div>

                        <!-- Phone Field -->
                        <div class="input-group-custom">
                            <label class="form-label"><i class="ti ti-phone"></i> Phone Number</label>
                            <input type="text"
                                   name="phone"
                                   value="{{user.phone}}"
                                   class="custom-input">
                        </div>

                        <!-- City Field -->
                        <div class="input-group-custom">
                            <label class="form-label"><i class="ti ti-map-pin"></i> City Location</label>
                            <input type="text"
                                   name="city"
                                   value="{{user.city}}"
                                   class="custom-input">
                        </div>

                        <!-- Profile Pic Document Uploader -->
                        <div class="input-group-custom matrix-fullwidth">
                            <label class="form-label"><i class="ti ti-photo-edit"></i> Modify Profile Avatar Picture</label>
                            <div class="file-upload-wrapper">
                                <input type="file"
                                       name="profile_pic"
                                       id="avatarFilePicker"
                                       class="custom-input"
                                       accept="image/*">
                            </div>
                        </div>
                    </div>

                    <!-- Action Control Strip -->
                    <div class="actions-shelf">
                        <button type="submit" class="update-btn">
                            <i class="ti ti-device-floppy"></i> Save Changes
                        </button>
                    </div>
                </form>
            </main>

        </div>
    </div>

    <!-- Live Avatar Picker Preview Handler Module Script -->
    <script>
        document.getElementById('avatarFilePicker')?.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgElement = document.getElementById('avatarDisplaySide');
                    if (imgElement) {
                        imgElement.src = e.target.result;
                    }
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>

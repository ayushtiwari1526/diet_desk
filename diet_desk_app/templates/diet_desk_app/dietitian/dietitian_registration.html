<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dietitian Registration | DietDesk</title>
    
    <!-- Premium Google Fonts & System Framework Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    
    {% include 'diet_desk_app/common/cdn.html' %}

    <style>
        /* ── Core Framework & Canvas Mesh Background ── */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #0f172a;
            margin: 0;
            padding: 0;
            background-color: #f4f9f5;
            background-image: 
                radial-gradient(at 0% 0%, rgba(34, 197, 94, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(56, 189, 248, 0.08) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(134, 239, 172, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 24px;
            box-sizing: border-box;
        }

        /* ── Glassmorphic Main Card ── */
        .register-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 32px;
            padding: 50px;
            box-shadow: 0 20px 50px rgba(34, 197, 94, 0.03), 0 4px 24px rgba(0, 0, 0, 0.01);
            box-sizing: border-box;
        }

        .deck-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .practitioner-icon-box {
            font-size: 2rem;
            color: #16a34a;
            background: #f0fdf4;
            padding: 14px;
            border-radius: 20px;
            display: inline-flex;
            margin-bottom: 16px;
            border: 1px solid rgba(34, 197, 94, 0.15);
        }

        .form-title {
            color: #0a1a0f;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin: 0;
        }

        .form-title span {
            color: #22c55e;
        }

        .form-subtitle {
            font-size: 1rem;
            color: #64748b;
            font-weight: 500;
            margin: 6px 0 0 0;
        }

        /* ── Two-Column Input Matrix ── */
        .form-matrix {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 24px;
            row-gap: 24px;
        }

        .matrix-fullwidth {
            grid-column: span 2;
        }

        .input-group-custom {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #334155;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-label i {
            font-size: 1rem;
            color: #16a34a;
        }

        .custom-input, .custom-select {
            height: 52px;
            border-radius: 14px;
            border: 1px solid #cbd5e1;
            padding: 0 16px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            color: #0f172a;
            background: #ffffff;
            box-sizing: border-box;
            transition: all 0.2s ease;
            width: 100%;
            outline: none;
        }

        .custom-input:focus, .custom-select:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
        }

        /* Gender Radio Elements Styling */
        .gender-deck {
            display: flex;
            gap: 16px;
            height: 52px;
            align-items: center;
        }

        .gender-tile {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            height: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            background: #ffffff;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            color: #475569;
            transition: all 0.2s ease;
            margin: 0;
        }

        .gender-tile input[type="radio"] {
            accent-color: #22c55e;
            width: 16px;
            height: 16px;
            margin: 0;
        }

        .gender-tile:hover {
            border-color: #bbf7d0;
            background: #f0fdf4;
            color: #0a1a0f;
        }

        /* ── File Input Customization ── */
        .file-upload-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .file-upload-wrapper::before {
            content: '\eb1a';
            font-family: 'tabler-icons' !important;
            position: absolute;
            left: 16px;
            color: #64748b;
            font-size: 1.1rem;
        }

        .custom-input[type="file"] {
            padding-left: 44px;
            padding-top: 12px;
            cursor: pointer;
        }

        /* ── Submit Elements Bar ── */
        .actions-shelf {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
            text-align: center;
        }

        .register-btn {
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0 40px;
            height: 54px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .register-btn:hover {
            background: #22c55e;
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.25);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .form-matrix {
                grid-template-columns: 1fr;
            }
            .matrix-fullwidth {
                grid-column: span 1;
            }
            .register-card {
                padding: 32px 20px;
            }
        }
    </style>
</head>
<body>

    {% include 'diet_desk_app/common/navbar.html' %}

    <div class="dashboard-container">
        <div class="register-card">
            
            <!-- Header section -->
            <div class="deck-header">
                <div class="practitioner-icon-box">
                    <i class="ti ti-stethoscope"></i>
                </div>
                <h1 class="form-title">Dietitian <span>Registration</span></h1>
                <p class="form-subtitle">Join the professional medical ecosystem network of DietDesk</p>
            </div>

            <form method="POST" enctype="multipart/form-data" action="/dietitian_registration/">
                {% csrf_token %}

                <div class="form-matrix">
                    
                    <!-- Email field -->
                    <div class="input-group-custom">
                        <label class="form-label"><i class="ti ti-mail"></i> Email Address</label>
                        <input type="email" name="email"
                               class="custom-input"
                               placeholder="you@example.com" required>
                    </div>

                    <!-- Password field -->
                    <div class="input-group-custom">
                        <label class="form-label"><i class="ti ti-lock"></i> Create Password</label>
                        <input type="password" name="password"
                               class="custom-input"
                               placeholder="Choose a strong password" required>
                    </div>

                    <!-- Name field -->
                    <div class="input-group-custom">
                        <label class="form-label"><i class="ti ti-user"></i> Full Name</label>
                        <input type="text" name="name"
                               class="custom-input"
                               placeholder="e.g. Dr. Jane Doe" required>
                    </div>

                    <!-- Phone field -->
                    <div class="input-group-custom">
                        <label class="form-label"><i class="ti ti-phone"></i> Phone Number</label>
                        <input type="text" name="phone"
                               class="custom-input"
                               placeholder="+91 XXXXX XXXXX" required>
                    </div>

                    <!-- Qualification field -->
                    <div class="input-group-custom">
                        <label class="form-label"><i class="ti ti-certificate"></i> Qualifications</label>
                        <input type="text" name="qualification"
                               class="custom-input"
                               placeholder="B.Sc, M.Sc Nutrition" required>
                    </div>

                    <!-- Gender field -->
                    <div class="input-group-custom">
                        <label class="form-label"><i class="ti ti-gender-transgender"></i> Gender Check</label>
                        <div class="gender-deck">
                            <label class="gender-tile">
                                <input type="radio" name="gender" value="Male" required>
                                <span>Male</span>
                            </label>
                            <label class="gender-tile">
                                <input type="radio" name="gender" value="Female">
                                <span>Female</span>
                            </label>
                        </div>
                    </div>

                    <!-- Experience field -->
                    <div class="input-group-custom">
                        <label class="form-label"><i class="ti ti-hourglass-high"></i> Practical Experience</label>
                        <input type="text" name="experience"
                               class="custom-input"
                               placeholder="e.g. 5 Years" required>
                    </div>

                    <!-- City field -->
                    <div class="input-group-custom">
                        <label class="form-label"><i class="ti ti-building-hospital"></i> Medical Jurisdiction City</label>
                        <select name="city" class="form-select custom-select" required>
                            <option value="" disabled selected>Select Active City</option>
                            <option>Lucknow</option>
                            <option>Kanpur</option>
                            <option>Delhi</option>
                            <option>Noida</option>
                        </select>
                    </div>

                    <!-- Registration field -->
                    <div class="input-group-custom matrix-fullwidth">
                        <label class="form-label"><i class="ti ti-license"></i> Institutional License / Registration Number</label>
                        <input type="text" name="registration_no"
                               class="custom-input"
                               placeholder="Enter your medical state registration sequence number" required>
                    </div>

                    <!-- Skills field -->
                    <div class="input-group-custom matrix-fullwidth">
                        <label class="form-label"><i class="ti ti-salad"></i> Core Focus Areas / Skills</label>
                        <input type="text" name="skills"
                               class="custom-input"
                               placeholder="Weight Loss, Diet Planning, Clinical Nutrition" required>
                    </div>

                    <!-- File profile pic upload field -->
                    <div class="input-group-custom matrix-fullwidth">
                        <label class="form-label"><i class="ti ti-photo-edit"></i> Practitioner Display Profile Picture</label>
                        <div class="file-upload-wrapper">
                            <input type="file" name="profile_pic"
                                   class="custom-input" accept="image/*" required>
                        </div>
                    </div>

                </div>

                <!-- Submit shelf button track -->
                <div class="actions-shelf">
                    <button type="submit" class="register-btn">
                        Submit Credentials & Register <i class="ti ti-user-plus"></i>
                    </button>
                </div>

            </form>
        </div>
    </div>
    
</body>
</html>
